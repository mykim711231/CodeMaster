name: Verify Documentation URLs

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *'   # Every day at 00:00 UTC (09:00 KST)

jobs:
  verify:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set execution policy
        run: Set-ExecutionPolicy -Scope Process -ExecutionPolicy Bypass

      - name: Run URL verification script
        run: pwsh ./shell/verify-plan-urls.ps1
        shell: pwsh

- name: Commit and push changes
        if: ${{ github.ref == 'refs/heads/main' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          $planFiles = @("docs/01.SpringBoot3.4.x/PLAN.md", "docs/02.Python3.12/PLAN.md")
          $existingFiles = $planFiles | Where-Object { Test-Path $_ }
          if ($existingFiles) {
              git add $existingFiles
              git diff --quiet --cached
              if (-not $LASTEXITCODE) {  # no changes staged
                  Write-Host "No changes to commit"
                  exit 0
              }
              git commit -m "🤖 Auto‑verified URLs (GitHub Actions)"
              git push
          }
          else {
              Write-Host "No PLAN.md files found to commit"
          }