<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>CodeMaster — Enterprise Developer Training</title>
<link rel="manifest" href="%BASE_URL%manifest.json">
<meta name="theme-color" content="#0A0E1A">
<link rel="apple-touch-icon" href="%BASE_URL%icon.svg">
<link rel="icon" type="image/svg+xml" href="%BASE_URL%icon.svg">

<!-- GitHub Markdown CSS (dark) -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css/github-markdown-dark.css">
<!-- Highlight.js (코드 구문 강조) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">

<!-- Lucide Icons (완전한 세트) -->
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script>
  // 페인트 전 테마 적용 — 깜빡임 방지
  try { if (localStorage.getItem('cm-theme') === 'light') document.documentElement.setAttribute('data-theme', 'light'); } catch (e) {}

  // Lucide 아이콘 초기화
  document.addEventListener('DOMContentLoaded', () => {
    if (window.lucide) {
      lucide.createIcons();
    }
  });
</script>
</head>
<body>

<!-- TOPBAR -->
<header class="topbar">
  <!-- 메뉴 (버거 -> 드롭다운) -->
  <div class="menu-wrap">
    <button class="icon-btn" id="menuToggle" aria-label="메뉴" aria-haspopup="true">
      <i data-lucide="menu"></i>
    </button>
    <div class="menu-dropdown" id="menuDropdown">
      <div class="menu-search">
        <i data-lucide="search"></i>
        <input type="text" placeholder="검색" aria-label="검색">
      </div>
      <button class="menu-link active"><i data-lucide="keyboard"></i> 타이핑 연습</button>
      <button class="menu-link"><i data-lucide="folder-open"></i> 폴더 열기</button>
      <button class="menu-link"><i data-lucide="git-branch"></i> 패턴 추출</button>
      <button class="menu-link"><i data-lucide="book-open"></i> 언어 공식 문서</button>
      <div class="menu-sep"></div>
      <button class="menu-link" id="statsMenuItem"><i data-lucide="pie-chart"></i> 학습 통계</button>
      <button class="menu-link"><i data-lucide="settings"></i> 설정</button>
    </div>
  </div>

  <!-- 왼쪽 사이드 패널 토글 (버거와 간격을 둠) -->
  <button class="icon-btn sidebar-toggle" id="sidebarToggle" aria-label="왼쪽 패널 숨김/보임">
    <i data-lucide="panel-left"></i>
  </button>

  <a class="topbar-logo" href="#">
    <div class="logo-icon">
      <i data-lucide="terminal" style="width:14px;height:14px;color:#fff"></i>
    </div>
    <span class="logo-text">Code<span>Master</span></span>
  </a>
  <div class="topbar-right">
    <div class="streak-badge">
      <i data-lucide="flame" style="width:12px;height:12px"></i> 14일 연속
    </div>
    <div class="xp-badge">
      <i data-lucide="zap" style="width:12px;height:12px"></i> 3,420 XP
    </div>
    <button class="icon-btn" id="themeToggle" aria-label="라이트/다크 테마 전환">
      <i data-lucide="sun" class="ti-sun"></i>
      <i data-lucide="moon" class="ti-moon"></i>
    </button>
    <button class="icon-btn" id="panelToggle" aria-label="오른쪽 패널 숨김/보임">
      <i data-lucide="panel-right"></i>
    </button>
  </div>
</header>

<!-- APP BODY -->
<div class="app">

    <!-- 기존 사이드바 (학습 콘텐츠 전용) -->
    <nav class="sidebar" id="sidebar">
    <!-- 진행 요약 + 이어서 연습 -->
    <div class="resume-card">
      <div class="resume-top">
        <span class="resume-label">이어서 연습</span>
        <span class="resume-pct" id="resumePct">34%</span>
      </div>
      <div class="resume-name" id="resumeName">Level 4 · Database — JPA</div>
      <div class="resume-track"><div class="resume-fill" style="width:34%"></div></div>
      <button class="resume-btn"><i data-lucide="play"></i> 이어서 연습하기</button>
    </div>
    <div class="sidebar-divider"></div>

<!-- 학습팩 메뉴 — 버튼 클릭 시 팝업 서브메뉴(팩 -> 문제), trainer가 채움 -->
<div class="pack-menu" id="packMenu">
  <button class="pack-menu-btn" id="packMenuBtn" type="button" aria-haspopup="true" aria-expanded="false">
    <i data-lucide="layers"></i>
    <span class="pack-menu-label">학습팩</span>
    <span class="pack-menu-cur" id="packMenuCur"></span>
    <i data-lucide="chevron-down" class="pack-menu-chev"></i>
  </button>
  <div class="pack-menu-pop" id="packMenuPop"></div>
</div>
<div class="sidebar-divider"></div>

<!-- 문서 (트리 네비게이션) -->
<div class="accordion" id="docAccordion">
  <button class="acc-header" id="docAccHeader">
    <i data-lucide="book-open"></i><span class="acc-title">문서</span><i data-lucide="chevron-down" class="acc-chevron"></i>
  </button>
  <div class="acc-body" id="docTreeBody" style="display:none"></div>
</div>
<div class="sidebar-divider"></div>

<!-- 3) 빠른 학습 -->
    <div class="accordion open">
      <button class="acc-header">
        <i data-lucide="zap"></i><span class="acc-title">빠른 학습</span><i data-lucide="chevron-down" class="acc-chevron"></i>
      </button>
      <div class="acc-body">
        <button class="sidebar-item" id="wrongAnswerBtn">
          <i data-lucide="repeat-2"></i> 오답 반복
          <span id="wrongAnswerBadge" class="badge" style="display:none">0</span>
        </button>
        <button class="sidebar-item" id="weakPatternBtn">
          <i data-lucide="target"></i> 취약 패턴
          <span id="weakPatternBadge" class="badge" style="display:none">0</span>
        </button>
        <button class="sidebar-item" id="randomQuizBtn">
          <i data-lucide="shuffle"></i> 랜덤 출제
        </button>
        <button class="sidebar-item" id="categoryLearnBtn">
          <i data-lucide="tags"></i> 카테고리별
        </button>
        <div id="categoryList" style="display:none"></div>
      </div>
    </div>
    <div class="sidebar-divider"></div>

    <!-- 4) 내 프로젝트 — 분석된 프로젝트 파일 트리 -->
    <div class="accordion" id="projectAccordion" style="display:none">
      <button class="acc-header">
        <i data-lucide="folder"></i><span class="acc-title" id="projectAccTitle">프로젝트</span><i data-lucide="chevron-down" class="acc-chevron"></i>
      </button>
      <div class="acc-body" id="projectAccBody">
      </div>
    </div>
  </nav>

  <!-- MAIN -->
  <main class="main">

    <!-- Typing Exercise -->
    <div class="practice">
      <div class="practice-head">
        <div class="section-title" style="margin-bottom:0">
          <i data-lucide="keyboard" style="width:12px;height:12px;color:var(--muted)"></i>
          현재 연습 중 — <span id="practiceTitle">Spring Boot · JPA Entity</span>
        </div>
        <div class="head-right">
          <span class="tt-legend">
            <b><i class="lg-ok"></i>정타</b>
            <b><i class="lg-case"></i>대소문자</b>
            <b><i class="lg-bad"></i>오타</b>
          </span>
        </div>
      </div>

      <div class="typing-section">
        <div class="typing-toolbar">
          <div class="editor-dots">
            <div class="dot dot-r"></div>
            <div class="dot dot-y"></div>
            <div class="dot dot-g"></div>
          </div>
          <div class="file-tab">
            <div class="dot"></div><span id="fileTabName">UserEntity.java</span>
          </div>
          <div class="typing-meta" id="practiceMeta"></div>
        </div>

        <!-- 따라치기 영역(라인 단위) — 엔진이 줄별 입력 행을 생성 -->
        <div class="tt-wrap" id="ttWrap"></div>

        <div class="typing-footer">
          <div class="wpm-display"><span id="wpmVal">0</span> WPM</div>
          <div class="acc-display"><span id="accVal">100%</span></div>
          <div class="prog-display">
            <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progFill" style="width:0%"></div></div>
            <span id="progPct">0%</span>
          </div>
          <button class="btn-ghost btn-sm" id="restartBtn"><i data-lucide="rotate-ccw"></i></button>
          <span class="footer-nav">
            <button class="btn-ghost btn-sm" id="prevBtn"><i data-lucide="skip-back"></i></button>
            <button class="btn-ghost btn-sm" id="nextBtn"><i data-lucide="skip-forward"></i></button>
          </span>
        </div>
      </div>

      <!-- 설명 패널 (접이식) -->
      <div class="explain-panel closed" id="explainPanel">
        <div class="explain-panel-head">
          <span><i data-lucide="book-open"></i> 문제 설명</span>
          <button class="explain-panel-toggle" id="explainPanelToggle" title="접기/펼치기">
            <i data-lucide="chevron-down"></i>
            <i data-lucide="chevron-up"></i>
          </button>
        </div>
        <div class="explain-panel-body">
          <div class="explain-concept" id="explainConcept"></div>
          <div class="explain-row" id="explainExpectedOutputWrap">
            <div class="explain-sub">실행 결과 예상</div>
            <div class="explain-expected" id="explainExpectedOutput"></div>
          </div>
          <div class="explain-row" id="explainTermsWrap">
            <div class="explain-sub">코드 뜯어보기</div>
            <ul class="explain-terms" id="explainTerms"></ul>
          </div>
          <div class="explain-row" id="explainWhyWrap">
            <div class="explain-sub">왜 쓰나요?</div>
            <div class="explain-why" id="explainWhy"></div>
          </div>
          <div class="explain-row" id="explainRealWorldWrap">
            <div class="explain-sub">실무에서는</div>
            <div class="explain-realworld" id="explainRealWorld"></div>
          </div>
          <div class="explain-pitfall" id="explainPitfall"></div>
        </div>
      </div>
    </div>

  </main>

  <!-- 드로어 오버레이 -->
  <div class="overlay" id="overlay"></div>

</div>

<!-- 학습 통계 모달 (버거 메뉴 -> 학습 통계) -->
<div class="modal" id="statsModal">
  <div class="modal-backdrop" data-close></div>
  <div class="modal-card">
    <div class="modal-head">
      <span class="modal-title"><i data-lucide="pie-chart"></i> 학습 통계</span>
      <button class="modal-close" id="statsClose" aria-label="닫기">✕</button>
    </div>
    <div class="modal-body">
      <div class="rp-block" id="statsSummary"></div>
      <div class="rp-block" id="statsRecent"></div>
      <div class="rp-block" id="statsWrong"></div>
      <div class="rp-block" id="statsPatterns"></div>
    </div>
  </div>
</div>


<!-- 설정 모달 -->
<div id="settingsModal" class="settings-modal" style="display:none">
  <div class="settings-modal-bg"></div>
  <div class="settings-modal-box">
    <div class="settings-modal-head">
      <b>에디터 설정</b>
      <button id="settingsModalClose">&times;</button>
    </div>
    <div class="settings-modal-body">
      <label>탭 크기 (들여쓰기 간격)
        <select id="settingsTabSize">
          <option value="2">2칸</option>
          <option value="4" selected>4칸</option>
          <option value="8">8칸</option>
        </select>
      </label>
      <label>코드 글자 크기
        <select id="settingsFontSize">
          <option value="12">12px</option>
          <option value="14" selected>14px</option>
          <option value="16">16px</option>
          <option value="18">18px</option>
        </select>
      </label>
      <label><input type="checkbox" id="settingsAutoIndent" checked> 자동 들여쓰기 (Enter)</label>
      <label><input type="checkbox" id="settingsOverwrite" checked> 덮어쓰기 모드 (OVR)</label>
      <label><input type="checkbox" id="settingsAutoNext"> 완료 후 자동 다음</label>
      <label><input type="checkbox" id="settingsLineNum" checked> 라인 번호 표시</label>
      <label><input type="checkbox" id="settingsIndentGuide"> 들여쓰기 가이드</label>
      <label><input type="checkbox" id="settingsTabChar"> 탭 문자 사용 (\\t)</label>
    </div>
  </div>
</div>

<!-- 문서 트리 초기화 -->
<script>
(function() {
    var docTree = document.getElementById('docTreeBody');
    var docHeader = document.getElementById('docAccHeader');
    var docAcc = document.getElementById('docAccordion');
    if (!docTree || !docHeader || !docAcc) return;

    var basePath = '/CodeMaster/';

    var docsData = [
        {label:'Spring Boot 3.4.x',children:[
            {label:'01.Java Core',path:'docs/01.SpringBoot3.4.x/01.Java_Core.md'},
            {label:'02.Spring Core',path:'docs/01.SpringBoot3.4.x/02.Spring_Core.md'},
            {label:'03.Spring MVC',path:'docs/01.SpringBoot3.4.x/03.Spring_MVC.md'},
            {label:'04.Database - JPA/MyBatis',path:'docs/01.SpringBoot3.4.x/04.Database_-_JPAMyBatis.md'},
            {label:'05.Concurrency',path:'docs/01.SpringBoot3.4.x/05.Concurrency.md'},
            {label:'06.Network',path:'docs/01.SpringBoot3.4.x/06.Network.md'},
            {label:'07.Gateway',path:'docs/01.SpringBoot3.4.x/07.Gateway.md'},
            {label:'08.Messaging',path:'docs/01.SpringBoot3.4.x/08.Messaging.md'},
            {label:'09.Batch',path:'docs/01.SpringBoot3.4.x/09.Batch.md'},
            {label:'10.Security',path:'docs/01.SpringBoot3.4.x/10.Security.md'},
            {label:'11.Cache',path:'docs/01.SpringBoot3.4.x/11.Cache.md'},
            {label:'12.Monitoring',path:'docs/01.SpringBoot3.4.x/12.Monitoring.md'},
            {label:'13.Testing',path:'docs/01.SpringBoot3.4.x/13.Testing.md'},
            {label:'14.Architecture',path:'docs/01.SpringBoot3.4.x/14.Architecture.md'},
            {label:'15.Design Pattern',path:'docs/01.SpringBoot3.4.x/15.Design_Pattern.md'},
            {label:'16.Build & DevOps',path:'docs/01.SpringBoot3.4.x/16.Build_&_DevOps.md'},
            {label:'17.Observability',path:'docs/01.SpringBoot3.4.x/17.Observability.md'},
            {label:'18.Data',path:'docs/01.SpringBoot3.4.x/18.Data.md'},
            {label:'19.Resilience & Cloud-Native',path:'docs/01.SpringBoot3.4.x/19.Resilience_&_Cloud-Native.md'},
            {label:'20.Reactive',path:'docs/01.SpringBoot3.4.x/20.Reactive.md'}
        ]},
        {label:'Python 3.12',children:[
            {label:'01.Python Language Basics',path:'docs/02.Python3.12/01.Python_Language_Basics.md'},
            {label:'02.Async',path:'docs/02.Python3.12/02.Async.md'},
            {label:'03.Data',path:'docs/02.Python3.12/03.Data.md'},
            {label:'04.Machine Learning',path:'docs/02.Python3.12/04.Machine_Learning.md'},
            {label:'05.Deep Learning',path:'docs/02.Python3.12/05.Deep_Learning.md'},
            {label:'06.LLM',path:'docs/02.Python3.12/06.LLM.md'},
            {label:'07.RAG',path:'docs/02.Python3.12/07.RAG.md'},
            {label:'08.AI Agent',path:'docs/02.Python3.12/08.AI_Agent.md'},
            {label:'09.Framework',path:'docs/02.Python3.12/09.Framework.md'},
            {label:'10.Production AI',path:'docs/02.Python3.12/10.Production_AI.md'},
            {label:'11.Vector Store',path:'docs/02.Python3.12/11.Vector_Store.md'},
            {label:'12.LLM Serving',path:'docs/02.Python3.12/12.LLM_Serving.md'},
            {label:'13.Prompt Structured',path:'docs/02.Python3.12/13.Prompt_Structured.md'},
            {label:'14.Fine Tuning & MLOps',path:'docs/02.Python3.12/14.Fine_Tuning_MLOps.md'},
            {label:'15.AI Quality',path:'docs/02.Python3.12/15.AI_Quality.md'}
        ]}
    ];

    var isOpen = false;
    docHeader.addEventListener('click', function(e) {
        e.stopImmediatePropagation();
        isOpen = !isOpen;
        docAcc.classList.toggle('open', isOpen);
        docTree.style.display = isOpen ? 'block' : 'none';
        if (isOpen && !docTree.hasChildNodes()) buildTree();
    });

    function makeEl(tag, css, html) {
        var el = document.createElement(tag);
        if (css) el.style.cssText = css;
        if (html) el.innerHTML = html;
        return el;
    }

    function buildTree() {
        docTree.innerHTML = '';
        for (var i = 0; i < docsData.length; i++) {
            (function(idx) {
                var cat = docsData[idx];
                var wrap = makeEl('div', 'margin-bottom:2px');

                var row = makeEl('div', 'display:flex;align-items:center;gap:6px;padding:8px 10px 8px 4px;cursor:pointer;border-radius:6px;font-size:13px;color:#e2e8f0;font-weight:500',
                    '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0;color:#64748b"><path d="M5 12h14"/><path d="M12 5v14"/></svg> ' + cat.label);

                var sub = makeEl('div', 'display:none;padding-left:18px');

                var expanded = false;
                row.addEventListener('click', function() {
                    expanded = !expanded;
                    sub.style.display = expanded ? 'block' : 'none';
                    var svg = row.querySelector('svg');
                    svg.innerHTML = expanded ? '<path d="M5 12h14"/>' : '<path d="M5 12h14"/><path d="M12 5v14"/>';
                    if (expanded && !sub.hasChildNodes()) {
                        for (var j = 0; j < cat.children.length; j++) {
                            (function(f) {
                                var docEl = makeEl('div', 'display:flex;align-items:center;gap:6px;padding:6px 10px;cursor:pointer;border-radius:6px;font-size:13px;color:#94a3b8',
                                    '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0"><path d="M13 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V9z"/><polyline points="13 2 13 9 20 9"/></svg> ' + f.label);
                                docEl.onmouseenter = function(){ this.style.background='#1e293b';this.style.color='#e2e8f0'; };
                                docEl.onmouseleave = function(){ this.style.background='';this.style.color=''; };
                                docEl.addEventListener('click', function(e) {
                                    e.stopPropagation();
                                    loadDoc(f.path);
                                });
                                sub.appendChild(docEl);
                            })(cat.children[j]);
                        }
                    }
                });
                row.onmouseenter = function(){ this.style.background='#1e293b'; };
                row.onmouseleave = function(){ this.style.background=''; };

                wrap.appendChild(row);
                wrap.appendChild(sub);
                docTree.appendChild(wrap);
            })(i);
        }
    }

    function loadDoc(path) {
        function render(md) {
            var main = document.querySelector('.main');
            if (!main) return;
            var name = path.split('/').pop().replace('.md','').replace(/_/g,' ');
            main.innerHTML = '<div style="padding:12px 20px;border-bottom:1px solid #334155;display:flex;align-items:center;gap:12px;background:#0d1117">' +
                '<button onclick="location.reload()" style="background:#21262d;color:#8b949e;border:1px solid #30363d;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:13px">← 타이핑 연습으로</button>' +
                '<span style="color:#8b949e;font-size:12px">' + path + '</span></div>' +
                '<h1 style="color:#c9d1d9;margin:20px;font-size:24px">' + name + '</h1>' +
                '<div class="markdown-body" style="padding:0 20px 40px">' + ((typeof marked!=='undefined')?marked.parse(md):'<pre>'+md.replace(/</g,'&lt;')+'</pre>') + '</div>';
         }
        function fetchAndRender() {
            var xhr = new XMLHttpRequest();
            xhr.open('GET', basePath + path, true);
            xhr.onload = function() { if (xhr.status === 200) render(xhr.responseText); };
            xhr.send();
        }
        if (typeof marked !== 'undefined') fetchAndRender();
        else { var s = document.createElement('script'); s.src='https://cdn.jsdelivr.net/npm/marked/marked.min.js'; s.onload=fetchAndRender; document.head.appendChild(s); }
    }
})();
</script>
<!-- Highlight.js (코드 구문 강조) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<!-- Marked 라이브러리 (마크다운 렌더링용) -->
<script src="https://cdn.jsdelivr.net/npm/marked@4.3.0/marked.min.js"></script>
<script>
  // Marked + Highlight.js 통합 설정
  if (typeof marked !== 'undefined' && typeof hljs !== 'undefined') {
    marked.setOptions({
      highlight: function(code, lang) {
        if (lang && hljs.getLanguage(lang)) {
          try { return hljs.highlight(code, { language: lang }).value; }
          catch(e) {}
        }
        return code;
      }
    });
  }
</script>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
