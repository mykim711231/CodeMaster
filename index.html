<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>CodeMaster — Enterprise Developer Training</title>
<link rel="manifest" href="%BASE_URL%manifest.json">
<meta name="theme-color" content="#0A0E1A">
<link rel="apple-touch-icon" href="%BASE_URL%icon.svg">
<link rel="icon" type="image/svg+xml" href="%BASE_URL%icon.svg">

<script>
  /* 페인트 전 테마 적용 — 깜빡임 방지 */
  try { if (localStorage.getItem('cm-theme') === 'light') document.documentElement.setAttribute('data-theme', 'light'); } catch (e) {}
</script>
</head>
<body>

<!-- TOPBAR -->
<header class="topbar">
  <!-- 메뉴 (버거 → 드롭다운) -->
  <div class="menu-wrap">
    <button class="icon-btn" id="menuToggle" aria-label="메뉴" aria-haspopup="true">
      <i data-lucide="menu"></i>
    </button>
    <div class="menu-dropdown" id="menuDropdown">
      <div class="menu-search">
        <i data-lucide="search"></i>
        <input type="text" placeholder="검색" aria-label="검색">
      </div>
      <button class="menu-link active"><i data-lucide="keyboard"></i> 타이핑 연습</button>
      <button class="menu-link"><i data-lucide="folder-open"></i> 폴더 열기</button>
      <button class="menu-link"><i data-lucide="git-branch"></i> 패턴 추출</button>
      <button class="menu-link"><i data-lucide="book-open"></i> 언어 공식 문서</button>
      <div class="menu-sep"></div>
      <button class="menu-link" id="statsMenuItem"><i data-lucide="pie-chart"></i> 학습 통계</button>
      <button class="menu-link"><i data-lucide="settings"></i> 설정</button>
    </div>
  </div>

  <!-- 왼쪽 사이드 패널 토글 (버거와 간격을 둠) -->
  <button class="icon-btn sidebar-toggle" id="sidebarToggle" aria-label="왼쪽 패널 숨김/보임">
    <i data-lucide="panel-left"></i>
  </button>

  <a class="topbar-logo" href="#">
    <div class="logo-icon">
      <i data-lucide="terminal" style="width:14px;height:14px;color:#fff"></i>
    </div>
    <span class="logo-text">Code<span>Master</span></span>
  </a>
  <div class="topbar-right">
    <div class="streak-badge">
      <i data-lucide="flame" style="width:12px;height:12px"></i> 14일 연속
    </div>
    <div class="xp-badge">
      <i data-lucide="zap" style="width:12px;height:12px"></i> 3,420 XP
    </div>
    <button class="icon-btn" id="themeToggle" aria-label="라이트/다크 테마 전환">
      <i data-lucide="sun" class="ti-sun"></i>
      <i data-lucide="moon" class="ti-moon"></i>
    </button>
    <button class="icon-btn" id="panelToggle" aria-label="오른쪽 패널 숨김/보임">
      <i data-lucide="panel-right"></i>
    </button>
  </div>
</header>

<!-- APP BODY -->
<div class="app">

    <!-- DOCS NAVIGATOR (LEFT PANEL) -->
    <nav class="docs-navigator" id="docsNavigator">
      <div class="docs-nav-header">
        <span class="docs-nav-title"><i data-lucide="book-open"></i> 문서</span>
        <button class="icon-btn docs-nav-close" id="docsNavClose" aria-label="닫기">
          <i data-lucide="x"></i>
        </button>
      </div>
      <div class="docs-nav-search">
        <i data-lucide="search"></i>
        <input type="text" id="docsSearch" placeholder="문서 검색..." aria-label="문서 검색">
      </div>
      <div class="docs-tree" id="docsTree"></div>
    </nav>

    <!-- 기존 사이드바 (학습 콘텐츠 전용) -->
    <nav class="sidebar" id="sidebar">
    <!-- 진행 요약 + 이어서 연습 -->
    <div class="resume-card">
      <div class="resume-top">
        <span class="resume-label">이어서 연습</span>
        <span class="resume-pct" id="resumePct">34%</span>
      </div>
      <div class="resume-name" id="resumeName">Level 4 · Database — JPA</div>
      <div class="resume-track"><div class="resume-fill" style="width:34%"></div></div>
      <button class="resume-btn"><i data-lucide="play"></i> 이어서 연습하기</button>
    </div>
    <div class="sidebar-divider"></div>

    <!-- 학습팩 메뉴 — 버튼 클릭 시 팝업 서브메뉴(팩 → 문제), trainer가 채움 -->
    <div class="pack-menu" id="packMenu">
      <button class="pack-menu-btn" id="packMenuBtn" type="button" aria-haspopup="true" aria-expanded="false">
        <i data-lucide="layers"></i>
        <span class="pack-menu-label">학습팩</span>
        <span class="pack-menu-cur" id="packMenuCur"></span>
        <i data-lucide="chevron-down" class="pack-menu-chev"></i>
      </button>
      <div class="pack-menu-pop" id="packMenuPop"></div>
    </div>
    <div class="sidebar-divider"></div>

    <!-- 3) 빠른 학습 -->
    <div class="accordion open">
      <button class="acc-header">
        <i data-lucide="zap"></i><span class="acc-title">빠른 학습</span><i data-lucide="chevron-down" class="acc-chevron"></i>
      </button>
      <div class="acc-body">
        <button class="sidebar-item" id="wrongAnswerBtn">
          <i data-lucide="repeat-2"></i> 오답 반복
          <span id="wrongAnswerBadge" class="badge" style="display:none">0</span>
        </button>
        <button class="sidebar-item" id="weakPatternBtn">
          <i data-lucide="target"></i> 취약 패턴
          <span id="weakPatternBadge" class="badge" style="display:none">0</span>
        </button>
        <button class="sidebar-item" id="randomQuizBtn">
          <i data-lucide="shuffle"></i> 랜덤 출제
        </button>
        <button class="sidebar-item" id="categoryLearnBtn">
          <i data-lucide="tags"></i> 카테고리별
        </button>
        <div id="categoryList" style="display:none"></div>
      </div>
    </div>
    <div class="sidebar-divider"></div>

    <!-- 4) 내 프로젝트 — 분석된 프로젝트 파일 트리 -->
    <div class="accordion" id="projectAccordion" style="display:none">
      <button class="acc-header">
        <i data-lucide="folder"></i><span class="acc-title" id="projectAccTitle">프로젝트</span><i data-lucide="chevron-down" class="acc-chevron"></i>
      </button>
      <div class="acc-body" id="projectAccBody">
      </div>
    </div>
  </nav>

  <!-- MAIN -->
  <main class="main">

    <!-- Typing Exercise -->
    <div class="practice">
      <div class="practice-head">
        <div class="section-title" style="margin-bottom:0">
          <i data-lucide="keyboard" style="width:12px;height:12px;color:var(--muted)"></i>
          현재 연습 중 — <span id="practiceTitle">Spring Boot · JPA Entity</span>
        </div>
        <div class="head-right">
          <span class="tt-legend">
            <b><i class="lg-ok"></i>정타</b>
            <b><i class="lg-case"></i>대소문자</b>
            <b><i class="lg-bad"></i>오타</b>
          </span>
        </div>
      </div>

      <div class="typing-section">
        <div class="typing-toolbar">
          <div class="editor-dots">
            <div class="dot dot-r"></div>
            <div class="dot dot-y"></div>
            <div class="dot dot-g"></div>
          </div>
          <div class="file-tab">
            <div class="dot"></div><span id="fileTabName">UserEntity.java</span>
          </div>
          <div class="typing-meta" id="practiceMeta"></div>
        </div>

        <!-- 따라치기 영역(라인 단위) — 엔진이 줄별 입력 행을 생성 -->
        <div class="tt-wrap" id="ttWrap"></div>

        <div class="typing-footer">
          <div class="wpm-display"><span id="wpmVal">0</span> WPM</div>
          <div class="acc-display"><span id="accVal">100%</span></div>
          <div class="prog-display">
            <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progFill" style="width:0%"></div></div>
            <span id="progPct">0%</span>
          </div>
          <button class="btn-ghost btn-sm" id="restartBtn"><i data-lucide="rotate-ccw"></i></button>
          <span class="footer-nav">
            <button class="btn-ghost btn-sm" id="prevBtn"><i data-lucide="skip-back"></i></button>
            <button class="btn-ghost btn-sm" id="nextBtn"><i data-lucide="skip-forward"></i></button>
          </span>
        </div>
      </div>

      <!-- 설명 패널 (접이식) -->
      <div class="explain-panel closed" id="explainPanel">
        <div class="explain-panel-head">
          <span><i data-lucide="book-open"></i> 문제 설명</span>
          <button class="explain-panel-toggle" id="explainPanelToggle" title="접기/펼치기">
            <i data-lucide="chevron-down"></i>
            <i data-lucide="chevron-up"></i>
          </button>
        </div>
        <div class="explain-panel-body">
          <div class="explain-concept" id="explainConcept"></div>
          <div class="explain-row" id="explainExpectedOutputWrap">
            <div class="explain-sub">실행 결과 예상</div>
            <div class="explain-expected" id="explainExpectedOutput"></div>
          </div>
          <div class="explain-row" id="explainTermsWrap">
            <div class="explain-sub">코드 뜯어보기</div>
            <ul class="explain-terms" id="explainTerms"></ul>
          </div>
          <div class="explain-row" id="explainWhyWrap">
            <div class="explain-sub">왜 쓰나요?</div>
            <div class="explain-why" id="explainWhy"></div>
          </div>
          <div class="explain-row" id="explainRealWorldWrap">
            <div class="explain-sub">실무에서는</div>
            <div class="explain-realworld" id="explainRealWorld"></div>
          </div>
          <div class="explain-pitfall" id="explainPitfall"></div>
        </div>
      </div>
    </div>

  </main>

  <!-- 드로어 오버레이 -->
  <div class="overlay" id="overlay"></div>

</div>

<!-- 학습 통계 모달 (버거 메뉴 → 학습 통계) -->
<div class="modal" id="statsModal">
  <div class="modal-backdrop" data-close></div>
  <div class="modal-card">
    <div class="modal-head">
      <span class="modal-title"><i data-lucide="pie-chart"></i> 학습 통계</span>
      <button class="modal-close" id="statsClose" aria-label="닫기">✕</button>
    </div>
    <div class="modal-body">
      <div class="rp-block" id="statsSummary"></div>
      <div class="rp-block" id="statsRecent"></div>
      <div class="rp-block" id="statsWrong"></div>
      <div class="rp-block" id="statsPatterns"></div>
    </div>
  </div>
</div>


<!-- 설정 모달 -->
<div id="settingsModal" class="settings-modal" style="display:none">
  <div class="settings-modal-bg"></div>
  <div class="settings-modal-box">
    <div class="settings-modal-head">
      <b>에디터 설정</b>
      <button id="settingsModalClose">&times;</button>
    </div>
    <div class="settings-modal-body">
      <label>탭 크기 (들여쓰기 간격)
        <select id="settingsTabSize">
          <option value="2">2칸</option>
          <option value="4" selected>4칸</option>
          <option value="8">8칸</option>
        </select>
      </label>
      <label>코드 글자 크기
        <select id="settingsFontSize">
          <option value="12">12px</option>
          <option value="14" selected>14px</option>
          <option value="16">16px</option>
          <option value="18">18px</option>
        </select>
      </label>
      <label><input type="checkbox" id="settingsAutoIndent" checked> 자동 들여쓰기 (Enter)</label>
      <label><input type="checkbox" id="settingsOverwrite" checked> 덮어쓰기 모드 (OVR)</label>
      <label><input type="checkbox" id="settingsAutoNext"> 완료 후 자동 다음</label>
      <label><input type="checkbox" id="settingsLineNum" checked> 라인 번호 표시</label>
      <label><input type="checkbox" id="settingsIndentGuide"> 들여쓰기 가이드</label>
      <label><input type="checkbox" id="settingsTabChar"> 탭 문자 사용 (\\t)</label>
    </div>
  </div>
</div>

<!-- Marked 라이브러리 (마크다운 렌더링용) -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
